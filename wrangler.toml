name = "crustpad"
main = "src/worker.ts"
compatibility_date = "2026-05-03"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
EXPIRY_DAYS = "1"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]
